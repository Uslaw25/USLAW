upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name app.uslawai.com;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # React App static files (served directly)
    location /app/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # React App root redirect
    location /app {
        return 301 /app/;
    }

    # Backend API routes (auth endpoints)
    location /auth/ {
        proxy_pass http://backend/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chainlit Chat routes
    location /chat/ {
        proxy_pass http://backend/chat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Chainlit
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Chainlit Chat root redirect  
    location /chat {
        return 301 /chat/;
    }

    # Test endpoint
    location /test {
        proxy_pass http://backend/test;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Handle any other unmatched routes
    location / {
        try_files $uri /index.html;
    }

}
